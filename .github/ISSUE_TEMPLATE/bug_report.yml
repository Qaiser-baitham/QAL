name: Bug report
description: Report a reproducible problem in the framework.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the exact command, dataset, model, mode, and config used.
      placeholder: |
        python main.py --non-interactive --dataset fmnist --model CNN --mode dual --epochs 3
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, PyTorch version, CUDA/CPU, and relevant hardware.
    validations:
      required: false
